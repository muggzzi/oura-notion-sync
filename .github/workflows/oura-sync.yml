name: Oura to Notion sync

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days back to sync (normal is 7; use a big number once to backfill history)"
        required: false
        default: "7"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
        run: python oura_to_notion.py
